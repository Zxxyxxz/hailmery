name = "hailmery"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Worker secrets (set via `wrangler secret put <NAME>`):
#   DATABASE_URL
#   OPENAI_API_KEY
#   ANTHROPIC_API_KEY
#   WIX_API_KEY (V0 prototype only)
#   WIX_SITE_ID  (V0 prototype only)

[observability]
enabled = true

# Scheduled jobs — routed by cron expression in src/index.ts scheduled().
#   */15 * * * *  publish tick      → PublishWorkflow (all active tenants)
#   0   */6 * * * generation tick   → GenerationWorkflow per under-target campaign
#   0   3   * * * nightly tick      → mail sync + metrics placeholder
#   0   8   * * 1 intelligence tick → weekly intelligence brief (Mon 08:00 UTC)
[triggers]
crons = ["*/15 * * * *", "0 */6 * * *", "0 3 * * *", "0 8 * * 1"]

# Cloudflare Workflows — the autonomous generation + publish pipelines.
# The class_name must match a named export from src/index.ts (the main module).
[[workflows]]
name = "hailmery-generation"
binding = "GENERATION_WORKFLOW"
class_name = "GenerationWorkflow"

[[workflows]]
name = "hailmery-publish"
binding = "PUBLISH_WORKFLOW"
class_name = "PublishWorkflow"

# R2 — stores uploaded tenant corpus documents (corpus/{tenant}/{doc}/{file}) and
# generated image/video assets. `wrangler dev` simulates this bucket locally, so
# no real bucket is needed until deploy (`wrangler r2 bucket create hailmery-assets`).
[[r2_buckets]]
binding = "R2"
bucket_name = "hailmery-assets"
preview_bucket_name = "hailmery-assets-preview"

[vars]
ENVIRONMENT = "development"
